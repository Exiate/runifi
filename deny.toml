[advisories]
# Deny any crates with known security vulnerabilities
version = 2
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    # rustls-pemfile is unmaintained but still used transitively; no security risk
    "RUSTSEC-2025-0134",
]

[licenses]
version = 2
# Allowed licenses (permissive only — no copyleft)
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MIT-0",
    "OpenSSL",
    "CDLA-Permissive-2.0",
]
# Anything not in `allow` is automatically denied (copyleft, etc.)
confidence-threshold = 0.8

[bans]
# Warn on duplicate versions of the same crate
multiple-versions = "warn"
# Allow wildcard deps — workspace members use `workspace = true` which resolves to path deps
wildcards = "allow"

[sources]
# Only allow crates from crates.io by default
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
