<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RuniFi Dashboard</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header id="header">
        <div class="header-left">
            <h1>RuniFi</h1>
            <span class="version" id="version"></span>
        </div>
        <div class="header-right">
            <span class="flow-name" id="flow-name"></span>
            <span class="separator">|</span>
            <span class="uptime" id="uptime"></span>
            <span class="separator">|</span>
            <span class="status" id="connection-status">Connecting...</span>
        </div>
    </header>

    <section id="summary-bar" class="summary-bar">
        <div class="summary-item" id="summary-processors">
            <span class="summary-label">Processors</span>
            <span class="summary-value" id="summary-proc-count">--</span>
            <span class="summary-indicator" id="summary-proc-indicator"></span>
        </div>
        <div class="summary-item" id="summary-queued">
            <span class="summary-label">Queued FlowFiles</span>
            <span class="summary-value" id="summary-queued-count">--</span>
        </div>
        <div class="summary-item" id="summary-throughput">
            <span class="summary-label">Throughput</span>
            <span class="summary-value" id="summary-throughput-value">--</span>
        </div>
        <div class="summary-item" id="summary-states">
            <span class="summary-label">States</span>
            <div class="summary-state-pills" id="summary-state-pills">--</div>
        </div>
        <div class="summary-item" id="summary-backpressure">
            <span class="summary-label">Back-Pressure</span>
            <span class="summary-value" id="summary-bp-count">--</span>
            <span class="summary-indicator" id="summary-bp-indicator"></span>
        </div>
    </section>

    <main>
        <section id="dag-section">
            <h2>Flow Topology</h2>
            <div class="dag-container" id="dag-container">
                <svg id="dag-canvas" xmlns="http://www.w3.org/2000/svg"></svg>
            </div>
        </section>

        <section id="processors-section">
            <h2>Processors</h2>
            <div class="card-grid" id="processors-grid"></div>
        </section>

        <section id="connections-section">
            <h2>Connections</h2>
            <div class="card-grid" id="connections-grid"></div>
        </section>
    </main>

    <!-- Queue Inspector Modal -->
    <div class="modal-overlay" id="queue-modal" style="display:none;">
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h3 id="queue-modal-title">Queue Inspector</h3>
                <button class="modal-close" id="queue-modal-close">&times;</button>
            </div>
            <div class="queue-toolbar">
                <span class="queue-summary" id="queue-summary"></span>
                <button class="btn-danger-sm" id="queue-empty-btn">Empty Queue</button>
            </div>
            <div class="modal-body">
                <table class="queue-table" id="queue-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>ID</th>
                            <th>Size</th>
                            <th>Age</th>
                            <th>Content</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="queue-table-body"></tbody>
                </table>
                <div class="queue-pagination" id="queue-pagination"></div>
            </div>
        </div>
    </div>

    <!-- FlowFile Detail Modal -->
    <div class="modal-overlay" id="flowfile-modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="flowfile-modal-title">FlowFile Details</h3>
                <button class="modal-close" id="flowfile-modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="ff-detail-meta" id="ff-detail-meta"></div>
                <h4 class="attr-heading">Attributes</h4>
                <table class="attr-table">
                    <thead>
                        <tr><th>Key</th><th>Value</th></tr>
                    </thead>
                    <tbody id="ff-attr-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Confirm Dialog -->
    <div class="modal-overlay" id="confirm-modal" style="display:none;">
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h3>Confirm</h3>
                <button class="modal-close" id="confirm-modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <p id="confirm-message"></p>
                <div class="confirm-actions">
                    <button class="btn-cancel" id="confirm-cancel">Cancel</button>
                    <button class="btn-danger-sm" id="confirm-ok">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
