<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RuniFi Dashboard</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header id="header">
        <div class="header-left">
            <h1>RuniFi</h1>
            <span class="version" id="version"></span>
        </div>
        <div class="header-right">
            <span class="flow-name" id="flow-name"></span>
            <span class="separator">|</span>
            <span class="uptime" id="uptime"></span>
            <span class="separator">|</span>
            <span class="status" id="connection-status">Connecting...</span>
        </div>
    </header>

    <section id="summary-bar" class="summary-bar">
        <div class="summary-item" id="summary-processors">
            <span class="summary-label">Processors</span>
            <span class="summary-value" id="summary-proc-count">--</span>
            <span class="summary-indicator" id="summary-proc-indicator"></span>
        </div>
        <div class="summary-item" id="summary-queued">
            <span class="summary-label">Queued FlowFiles</span>
            <span class="summary-value" id="summary-queued-count">--</span>
        </div>
        <div class="summary-item" id="summary-throughput">
            <span class="summary-label">Throughput</span>
            <span class="summary-value" id="summary-throughput-value">--</span>
        </div>
        <div class="summary-item" id="summary-states">
            <span class="summary-label">States</span>
            <div class="summary-state-pills" id="summary-state-pills">--</div>
        </div>
        <div class="summary-item" id="summary-backpressure">
            <span class="summary-label">Back-Pressure</span>
            <span class="summary-value" id="summary-bp-count">--</span>
            <span class="summary-indicator" id="summary-bp-indicator"></span>
        </div>
    </section>

    <main>
        <section id="dag-section">
            <h2>Flow Topology</h2>
            <div class="dag-container" id="dag-container">
                <svg id="dag-canvas" xmlns="http://www.w3.org/2000/svg"></svg>
            </div>
        </section>

        <section id="processors-section">
            <h2>Processors</h2>
            <div class="card-grid" id="processors-grid"></div>
        </section>

        <section id="connections-section">
            <h2>Connections</h2>
            <div class="card-grid" id="connections-grid"></div>
        </section>
    </main>

    <script src="/app.js"></script>
</body>
</html>
