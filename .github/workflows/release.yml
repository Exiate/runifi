name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  release:
    name: Build & Package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: crates/runifi-api/dashboard-react/package-lock.json

      - name: Build dashboard
        working-directory: crates/runifi-api/dashboard-react
        run: npm ci && npm run build

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable

      - name: Cache cargo registry & target
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Build release
        run: cargo build --workspace --release

      - name: Run tests
        run: cargo test --workspace

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit --deny warnings

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run cargo deny
        run: cargo deny check

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm

      - name: Build .deb package
        run: cargo deb -p runifi --no-build --no-strip

      - name: Build .rpm package
        run: cargo generate-rpm -p crates/runifi-server

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create tarball
        run: |
          TARBALL="runifi-${{ steps.version.outputs.VERSION }}-x86_64-linux.tar.gz"
          mkdir -p staging/runifi
          cp target/release/runifi staging/runifi/
          cp target/release/runifi-cli staging/runifi/
          cp config/flow.toml staging/runifi/flow.example.toml
          cp dist/runifi.service staging/runifi/
          cp dist/runifi.env staging/runifi/
          cp LICENSE staging/runifi/
          tar -czf "$TARBALL" -C staging runifi
          echo "TARBALL=$TARBALL" >> "$GITHUB_OUTPUT"
        id: tarball

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          generate_release_notes: true
          files: |
            target/debian/runifi_*.deb
            target/generate-rpm/runifi-*.rpm
            ${{ steps.tarball.outputs.TARBALL }}
