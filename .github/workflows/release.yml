name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

permissions:
  contents: write

jobs:
  release:
    name: Build & Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: crates/runifi-api/dashboard-react/package-lock.json

      - name: Build dashboard
        working-directory: crates/runifi-api/dashboard-react
        run: npm ci && npm run build

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Build release
        run: cargo build --workspace --release

      - name: Run tests
        run: cargo test --workspace

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm

      - name: Build .deb package
        run: cargo deb -p runifi --no-build --no-strip

      - name: Build .rpm package
        run: cargo generate-rpm -p crates/runifi-server

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create tarball
        run: |
          TARBALL="runifi-${{ steps.version.outputs.VERSION }}-x86_64-linux.tar.gz"
          mkdir -p staging/runifi
          cp target/release/runifi staging/runifi/
          cp target/release/runifi-cli staging/runifi/
          cp config/examples/demo-pipeline.toml staging/runifi/flow.example.toml
          cp dist/runifi.service staging/runifi/
          cp dist/runifi.env staging/runifi/
          cp LICENSE staging/runifi/
          tar -czf "$TARBALL" -C staging runifi
          echo "TARBALL=$TARBALL" >> "$GITHUB_OUTPUT"
        id: tarball

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            target/debian/runifi_*.deb
            target/generate-rpm/runifi-*.rpm
            ${{ steps.tarball.outputs.TARBALL }}
