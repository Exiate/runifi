name: Bug Report
description: Report a bug in RuniFi
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below.

  - type: input
    id: os
    attributes:
      label: Operating System
      description: Linux distribution and version
      placeholder: "e.g., Rocky Linux 9.3, Ubuntu 24.04"
    validations:
      required: true

  - type: input
    id: rust-version
    attributes:
      label: Rust Version
      description: Output of `rustc --version`
      placeholder: "e.g., rustc 1.85.0"
    validations:
      required: true

  - type: input
    id: runifi-version
    attributes:
      label: RuniFi Version
      description: Output of `runifi --version` or commit SHA
      placeholder: "e.g., 0.1.0 or abc1234"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output (automatically formatted as code)
      render: shell
    validations:
      required: false
